<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a red vector</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <br />
    v1 x: <input type="text" id="v1x" value="2.25" />
    y: <input type="text" id="v1y" value="2.25" />
    <br />
    v2 x: <input type="text" id="v2x" value="2.25" />
    y: <input type="text" id="v2y" value="2.25" />
    <br />
    <input type="button" id="drawBtn" value="Draw" onclick="handleDrawEvent()" />
    <br />
    Operation:
    <select id="operation">
      <option value="add">add</option>
      <option value="sub">sub</option>
      <option value="mul">mul</option>
      <option value="div">div</option>
      <option value="magnitude">magnitude</option>
      <option value="normalize">normalize</option>
      <option value="angleBetween">Angle Between</option>
      <option value="area">Area</option>
    </select>
    Scalar: <input type="text" id="scalar" value="1" />
    <input type="button" id="drawOpBtn" value="Draw Operation" onclick="handleDrawOperationEvent()" />
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="asgn0.js"></script>
  </body>
</html>
